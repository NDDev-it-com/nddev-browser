name: scorecard
on:
  branch_protection_rule:
  push:
    branches: [main]
  schedule:
    - cron: '0 5 * * 3'
  workflow_dispatch:
permissions: {}
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  scorecard:
    permissions:
      id-token: write
      contents: read
      actions: read
    uses: NDDev-it-com/ci-workflows/.github/workflows/public-scorecard-json.yml@2ccb80e96f5771b6a6b4eae63a4f47e232906dc7 # 0.12.0
